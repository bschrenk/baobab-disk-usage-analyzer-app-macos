name: Build Baobab macOS App

on:
  schedule:
    - cron: "0 6 * * *"   # daily check
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 47.0). Leave blank to build latest."
        required: false
        default: ""
  push:
    tags:
      - "v*"

jobs:
  ########################################
  # 🔍 Check for latest GNOME version
  ########################################
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_build: ${{ steps.check_tag.outputs.should_build }}

    steps:
      - name: Get latest version
        id: get_version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            LATEST="${{ inputs.version }}"
            echo "Using manually specified version: $LATEST"
          else
            LATEST=$(curl -s "https://api.github.com/repos/GNOME/baobab/tags?per_page=20" \
              | grep '"name"' \
              | grep -Eo '[0-9]+\.[0-9]+' \
              | sort -V \
              | tail -1)
            echo "Latest version: $LATEST"
          fi
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          # Always build if version was manually specified
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "Manual version specified — forcing build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif git ls-remote --tags https://github.com/${{ github.repository }}.git | grep -q "refs/tags/$TAG"; then
            echo "Tag exists"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  ########################################
  # 🏷️ Create tag (if new version)
  ########################################
  tag:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          VERSION=${{ needs.check.outputs.version }}
          TAG="v$VERSION"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag "$TAG"
          git push origin "$TAG"

  ########################################
  # 🍎 Build + Package on macOS
  ########################################
  build:
    needs: [check, tag]
    if: always() && (startsWith(github.ref, 'refs/tags/') || needs.check.outputs.should_build == 'true')
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ needs.check.outputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          brew update
          brew install meson ninja pkgconf vala gettext itstool desktop-file-utils
          brew install gtk4 libadwaita glib pango cairo graphene adwaita-icon-theme hicolor-icon-theme librsvg

      - name: Download source
        run: |
          curl -LO https://download.gnome.org/sources/baobab/${VERSION%.*}/baobab-${VERSION}.tar.xz
          tar -xf baobab-${VERSION}.tar.xz

      - name: Build
        run: |
          cd baobab-${VERSION}
          meson setup build --prefix="$GITHUB_WORKSPACE/install"
          meson compile -C build
          meson install -C build

      - name: Create app bundle
        run: |
          chmod +x scripts/create_app.sh
          ./scripts/create_app.sh "$GITHUB_WORKSPACE/install" "$VERSION"

      - name: Create DMG
        run: |
          hdiutil create -volname "Baobab" -srcfolder Baobab.app -ov -format UDZO Baobab.dmg

      - name: Zip app bundle
        run: zip -r Baobab.app.zip Baobab.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: baobab-v${{ env.VERSION }}
          path: |
            Baobab.app.zip
            Baobab.dmg

  ########################################
  # 🚀 Create GitHub Release
  ########################################
  release:
    needs: [check, build]
    if: needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/') || needs.check.outputs.should_build == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: baobab-v${{ needs.check.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          body: |
            ## Baobab v${{ needs.check.outputs.version }} — macOS Build

            **Baobab** (Disk Usage Analyzer) is a GNOME application for visualizing where disk space is used. It provides a tree view and a ring chart for exploring folder and device sizes.

            This is an **unofficial macOS build** of the upstream GNOME project, automated by this repository. It is not affiliated with or endorsed by the GNOME project.

            ### Upstream
            - Source: [GNOME/baobab on GitLab](https://gitlab.gnome.org/GNOME/baobab)
            - Release notes: [baobab v${{ needs.check.outputs.version }} on GNOME releases](https://gitlab.gnome.org/GNOME/baobab/-/releases/v${{ needs.check.outputs.version }})

            ### Installation
            1. Download `Baobab.dmg`
            2. Open the DMG and drag `Baobab.app` to your Applications folder
            3. On first launch, right-click → Open to bypass Gatekeeper (app is unsigned)
          files: |
            Baobab.dmg
            Baobab.app.zip